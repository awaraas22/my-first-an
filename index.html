<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Madam Ji 🥺</title>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    background: linear-gradient(#ffe0ec, #ffd6cc);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial;
}

/* 🌸 flowers */
.flower {
    position: absolute;
    top: -100px;
    pointer-events: none;
    animation: fall linear infinite;
    z-index: 1;
}

/* 🌸 smooth realistic fall */
@keyframes fall {
    0%   { transform: translateY(-100px) translateX(0px) rotate(0deg); }
    25%  { transform: translateY(25vh) translateX(20px) rotate(90deg); }
    50%  { transform: translateY(50vh) translateX(-20px) rotate(180deg); }
    75%  { transform: translateY(75vh) translateX(15px) rotate(270deg); }
    100% { transform: translateY(110vh) translateX(-15px) rotate(360deg); }
}

/* 💌 envelope */
.envelope {
    position: relative;
    width: 380px;
    height: 320px;
    background: #ff6f91;
    border-radius: 12px;
    overflow: hidden;
    z-index: 10;
}

/* 💌 flap */
.flap {
    position: absolute;
    width: 100%;
    height: 100%;
    background:
        linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)),
        url("sa.png") no-repeat;

    background-size: 90%;
    background-position: center 80%;
    
    clip-path: polygon(0 0, 100% 0, 50% 60%);
    transform-origin: top;
    transition: 0.6s;
}

/* 💌 letter */
.letter {
    position: absolute;
    width: 92%;
    height: 92%;
    background: white;
    top: 4%;
    left: 4%;
    border-radius: 10px;
    padding: 15px;
    box-sizing: border-box;
    transform: translateY(100%);
    transition: 0.6s;
    overflow-y: auto;
}

/* text */
#typeText {
    font-size: 14px;
    line-height: 1.6;
    color: #333;
}

/* 🔴 seal */
.seal {
    position: absolute;
    width: 70px;
    height: 70px;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    background: url("seal.png") center/cover no-repeat;
    border-radius: 50%;
    cursor: pointer;
    z-index: 20;
}

/* 💥 seal break */
@keyframes crack {
    0%   { transform: translateX(-50%) scale(1) rotate(0); }
    30%  { transform: translateX(-50%) scale(1.2) rotate(10deg); }
    60%  { transform: translateX(-50%) scale(0.9) rotate(-10deg); }
    100% { transform: translateX(-50%) scale(0); opacity: 0; }
}
.seal.break {
    animation: crack 0.6s ease forwards;
}

/* 💌 open */
.envelope.open .flap {
    transform: rotateX(180deg);
}
.envelope.open .letter {
    transform: translateY(0);
}
</style>
</head>

<body>

<div class="envelope" id="env">

    <div class="flap"></div>

    <div class="letter">
        <p id="typeText"></p>
    </div>

    <div class="seal" onclick="breakSeal()"></div>

</div>

<script>

// 💌 message
const message = `Dear Devi ji 🤍

Please maaf kar do 😭

Aap ke bina meri life bahut khali khali si lag rahi hai 🥺 Mujhe pata hai aapki iss narazgi ka reason main khud hoon. Please maaf kar do na madam ji 🤍

Please maaf kar do na… sorry na madam ji… please yaar, please 🥺 Narazgi chhod do na 😭 Naraz mat raho madam ji. Main khud ko aap ke bina bahut khali sa mehsoos karta hoon.

Aap ka hona meri life mein bahut zyada important hai… aap ke bina main incomplete hoon madam ji 💔

Main hi pagal hoon jo maine aapko hurt kiya… khud pe bahut gussa aa raha hai. Please mujhse baat kar lo madam ji, please please 🥺

Aap bahut zyada naraz ho mujhse, aur reason bhi main hi hoon… please madam ji, narazgi chhod do 😭

Maaf kar do na please… madam ji… devi ji 🤍🌺

Sorry… sorry… sorry na madam ji 😭 Maan bhi jao na madam ji. Itna zyada distance main handle nahi kar pa raha. Khud ko bahut adhura mehsoos kar raha hoon 😔

Koi aur naraz ho jaye to mujhe itna farak nahi padta… lekin aap ka mujhse naraz hona, gussa hona, baat na karna… ye sab mujhe bahut hurt karta hai 💔

Andar hi andar main bahut khali sa ho jata hoon… aap ke bina main incomplete hoon.

Aap ka hona meri life mein bahut hi zyada important hai… jo main adhura hoon, use aap complete karti ho madam ji 🤍

Please maaf kar do 😭
Madam ji 🤍 Devi ji 🌺

Sincerely,
Aap ka nadan sevak 🥺🙏`;

let i = 0;
let opened = false;

// ⌨️ typing
function typeWriter() {
    if (i < message.length) {
        document.getElementById("typeText").innerHTML += 
            message.charAt(i) === "\n" ? "<br>" : message.charAt(i);
        i++;
        setTimeout(typeWriter, 20);
    }
}

// 💥 open/close
function breakSeal() {
    const seal = document.querySelector(".seal");
    const env = document.getElementById("env");
    const text = document.getElementById("typeText");

    if (!opened) {
        seal.classList.add("break");

        setTimeout(() => {
            env.classList.add("open");
            text.innerHTML = "";
            i = 0;
            setTimeout(typeWriter, 400);
        }, 400);

        opened = true;

    } else {
        env.classList.remove("open");
        seal.classList.remove("break");
        text.innerHTML = "";
        i = 0;
        opened = false;
    }
}

// 🌸 flower images
const flowerImages = ["f1.png","f2.png","f3.png","f4.png","f5.png","f6.png"];

// 🎯 equal lanes system
const lanes = 13;
const laneWidth = window.innerWidth / lanes;

function createFlower() {
    const img = document.createElement("img");
    img.classList.add("flower");

    img.src = flowerImages[Math.floor(Math.random()*flowerImages.length)];

    // lane-based balanced position
    const lane = Math.floor(Math.random() * lanes);
    let x = lane * laneWidth + laneWidth / 2;
    x += (Math.random() - 0.5) * 20;

    img.style.left = x + "px";

    // size
    img.style.width = (60 + Math.random()*60) + "px";

    // duration
    let duration = 10 + Math.random()*5;
    img.style.animationDuration = duration + "s";

    document.body.appendChild(img);

    setTimeout(() => {
        img.remove();
    }, duration * 1000);
}

// 🌸 dense smooth fall
setInterval(createFlower, 200);

</script>

</body>
</html>
